<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu a Senha — Fatec-EJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
        <div class="text-center mb-8">
            <img src="http://empresajuniorfatec.com.br/images/logo.png" alt="Logo Empresa Júnior Fatec" class="w-32 h-auto mb-6 mx-auto" />
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Recuperar Acesso</h1>
            <p class="text-sm text-slate-500">Digite o e-mail associado à sua conta</p>
        </div>

        <form id="forgot-password-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">E-mail</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    placeholder="seu@email.com"
                />
            </div>

            <button
                type="submit"
                id="submit-btn"
                class="w-full bg-red-800 hover:bg-red-900 text-white font-semibold py-3 px-4 rounded-lg transition duration-200"
            >
                Enviar Link de Recuperação
            </button>
        </form>

        <div id="status-message" class="mt-6 hidden p-4 rounded-lg text-sm font-medium"></div>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-600">
                Lembrou sua senha?
                <a href="admin/login.html" class="text-red-800 hover:text-red-900 font-semibold">Faça login</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgot-password-form');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            if (!email) {
                showStatus('Por favor, digite o e-mail', 'error');
                return;
            }

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            try {
                const response = await fetch('http://localhost/Fatec-EJ/backend/public/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(
                        '✅ ' + data.message + ' Verifique sua caixa de entrada (ou spam).',
                        'success'
                    );
                    form.reset();
                    submitBtn.textContent = 'Link enviado!';
                } else {
                    showStatus('❌ ' + (data.message || 'Erro ao enviar o link'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar Link de Recuperação';
                }
            } catch (error) {
                console.error('Erro:', error);
                showStatus('❌ Erro ao conectar com o servidor', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Link de Recuperação';
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'bg-green-50', 'text-green-800');
            if (type === 'success') {
                statusMessage.classList.add('bg-green-50', 'text-green-800');
            } else {
                statusMessage.classList.add('bg-red-50', 'text-red-800');
            }
        }
    </script>
</body>
</html>
