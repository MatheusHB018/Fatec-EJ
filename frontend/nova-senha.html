<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Fatec-EJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
        <div class="text-center mb-8">
            <img src="http://empresajuniorfatec.com.br/images/logo.png" alt="Logo Empresa Júnior Fatec" class="w-32 h-auto mb-6 mx-auto" />
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Criar Nova Senha</h1>
            <p class="text-sm text-slate-500" id="email-display"></p>
        </div>

        <form id="reset-password-form" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Nova Senha</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="8"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    placeholder="Mínimo 8 caracteres"
                />
                <p class="text-xs text-slate-500 mt-1">Use letras, números e caracteres especiais</p>
            </div>

            <div>
                <label for="password-confirmation" class="block text-sm font-semibold text-slate-700 mb-2">Confirmar Senha</label>
                <input
                    type="password"
                    id="password-confirmation"
                    name="password_confirmation"
                    required
                    minlength="8"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    placeholder="Confirme a nova senha"
                />
            </div>

            <button
                type="submit"
                id="submit-btn"
                class="w-full bg-red-800 hover:bg-red-900 text-white font-semibold py-3 px-4 rounded-lg transition duration-200"
            >
                Redefinir Senha
            </button>
        </form>

        <div id="status-message" class="mt-6 hidden p-4 rounded-lg text-sm font-medium"></div>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-600">
                Voltar para
                <a href="admin/login.html" class="text-red-800 hover:text-red-900 font-semibold">página de login</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('reset-password-form');
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('password-confirmation');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');
        const emailDisplay = document.getElementById('email-display');

        // Extrai token e email da URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');

        if (!token || !email) {
            showStatus('❌ Link inválido ou expirado. Solicite um novo link.', 'error');
            form.style.display = 'none';
            submitBtn.disabled = true;
        } else {
            emailDisplay.textContent = `Para: ${email}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const passwordConfirmation = passwordConfirmInput.value;

            if (password !== passwordConfirmation) {
                showStatus('❌ As senhas não conferem', 'error');
                return;
            }

            if (password.length < 8) {
                showStatus('❌ A senha deve ter no mínimo 8 caracteres', 'error');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Redefinindo...';

            try {
                const response = await fetch('http://localhost/Fatec-EJ/backend/public/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        token,
                        password,
                        password_confirmation: passwordConfirmation,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('✅ ' + data.message + ' Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin/login.html';
                    }, 2000);
                } else {
                    showStatus('❌ ' + (data.message || 'Erro ao redefinir a senha'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Redefinir Senha';
                }
            } catch (error) {
                console.error('Erro:', error);
                showStatus('❌ Erro ao conectar com o servidor', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Redefinir Senha';
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'bg-green-50', 'text-green-800');
            if (type === 'success') {
                statusMessage.classList.add('bg-green-50', 'text-green-800');
            } else {
                statusMessage.classList.add('bg-red-50', 'text-red-800');
            }
        }
    </script>
</body>
</html>
