<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EJ Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body class="min-h-screen bg-slate-50 font-[Inter] text-slate-800 antialiased" data-page="admin-login">
  <main class="min-h-screen flex items-center justify-center px-6 py-10">
    <section class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-8 shadow-md">
      <div class="text-center">
        <img src="http://empresajuniorfatec.com.br/images/logo.png" alt="Logo Empresa Júnior FATEC" class="mx-auto h-16 w-auto object-contain" />
        <h1 class="mt-4 text-3xl font-extrabold tracking-tight">
          <span class="text-red-800">EJ</span>
          <span class="text-slate-900"> Admin</span>
        </h1>
        <p class="mt-2 text-sm text-slate-500">Acesse o painel de controle</p>
      </div>

      <form id="admin-login-form" class="mt-8 space-y-5">
        <div>
          <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">E-mail</label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
              <i class="fa-regular fa-envelope"></i>
            </span>
            <input id="email" type="email" placeholder="seu@email.com" class="w-full rounded-xl border border-gray-200 bg-white py-3 pl-11 pr-4 text-slate-800 outline-none transition focus:border-red-800 focus:ring-2 focus:ring-red-100" />
          </div>
        </div>

        <div>
          <label for="senha" class="mb-2 block text-sm font-semibold text-slate-700">Senha</label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input id="senha" type="password" placeholder="Digite sua senha" class="w-full rounded-xl border border-gray-200 bg-white py-3 pl-11 pr-4 text-slate-800 outline-none transition focus:border-red-800 focus:ring-2 focus:ring-red-100" />
          </div>
        </div>

        <div class="text-right">
          <a href="#" class="text-sm font-medium text-slate-500 transition hover:text-red-800">Esqueceu a senha?</a>
        </div>

        <p id="login-status" class="hidden rounded-xl px-4 py-3 text-sm font-medium"></p>

        <button type="submit" class="w-full rounded-xl bg-red-800 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-red-900">
          Entrar
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 transition hover:text-red-800">
          <i class="fa-solid fa-arrow-left"></i>
          Voltar ao site
        </a>
      </div>
    </section>
  </main>

  <script src="../assets/js/admin.js"></script>
</body>
</html>
